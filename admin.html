<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registros — Administrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1B1E;
    --card:#16262A;
    --card-2:#1D3238;
    --accent:#E8A33D;
    --accent-dim:#B87D2C;
    --text:#F5F1E8;
    --text-dim:#9FB0AE;
    --line:#2A3F42;
    --good:#4FA88A;
    --bad:#D9694F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  #gate{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .gate-card{
    width:100%;
    max-width:360px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 24px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;
    margin-bottom:18px;
  }
  input[type=password]{
    width:100%;
    background:var(--card-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-size:16px;
    outline:none;
    margin-bottom:12px;
  }
  input:focus{ border-color:var(--accent); }
  .btn{
    width:100%;
    background:var(--accent);
    color:#1a1207;
    border:none;
    border-radius:10px;
    padding:13px 18px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }
  .err{ color:var(--bad); font-size:13px; margin-top:10px; display:none; }

  #panel{ display:none; padding:24px 18px 60px; max-width:900px; margin:0 auto; }
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .count{
    color:var(--text-dim);
    font-size:13px;
  }
  .ronda-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:var(--card-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:20px;
  }
  .ronda-label{
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:3px;
  }
  .ronda-name{
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    font-weight:600;
    color:var(--accent);
  }
  .new-round-btn{
    background:transparent;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 14px;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .filter-select{
    background:var(--card-2);
